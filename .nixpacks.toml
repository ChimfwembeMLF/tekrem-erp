[phases.setup]
nixPackages = ["php83", "composer"]

[phases.install]
cmds = [
    "composer install --no-interaction --optimize-autoloader --no-dev"
]

[phases.build]
exclude = true

[phases.caddy]
exclude = true

[build]
excludeNodeModules = true
exclude = true

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=8080"