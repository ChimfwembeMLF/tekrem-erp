name: Build, Test and Deploy Laravel App

on:
  push:
    branches: [demo]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, xml, ctype, fileinfo, json, tokenizer, mysql, pdo, openssl, zip

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then cp .env.example .env; fi

      - name: Generate Laravel key
        run: php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --env=testing --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-node-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-node-yarn-

      - name: Install NPM/Yarn dependencies
        run: yarn install --frozen-lockfile || npm ci

      # - name: Lint & run unit tests
      #   run: |
      #     php artisan test --parallel
      #   env:
      #     APP_ENV: testing

  build:
    needs: install-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup PHP with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, xml, ctype, fileinfo, json, tokenizer, mysql, pdo, openssl, zip

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM/Yarn dependencies
        run: yarn install --frozen-lockfile || npm ci

      - name: Build frontend assets
        run: |
          if [ -f vite.config.ts ] || [ -f vite.config.js ]; then
            yarn build || npm run build
          fi

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then cp .env.example .env; fi

      - name: Generate Laravel key
        run: php artisan key:generate

      - name: Cache Laravel configs
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Optimize Composer for deployment
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

  deploy-demo:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/demo'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files before deployment
        run: |
          echo "Listing files in workspace before deployment:"
          ls -lR

      - name: SSH run post-deployment hooks and update code
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SERVER_PATH_DEMO }}
            git fetch origin demo
            git checkout -f demo
            git reset --hard origin/demo
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            npm install
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH run post-deployment hooks and update code
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SERVER_PATH_PROD }}
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            npm install
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
